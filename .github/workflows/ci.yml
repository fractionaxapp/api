name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This service depends on the @fractionax/* workspace packages, so it cannot build
# in isolation. CI reconstructs the fractionaxapp meta-monorepo, checks out the
# triggering commit into the services/api submodule, and runs the api tasks via moon.
#
# Cross-repo access uses a GitHub App (installed on the fractionaxapp org with
# Contents: read) that mints a short-lived token at run time. The App ID is not
# secret (it appears in logs and App settings) so it is inlined; only the private
# key is an org-level secret: MONOREPO_APP_PRIVATE_KEY.
jobs:
  ci:
    name: Build, lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Mint a cross-repo token from the GitHub App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: "4090077"
          private-key: ${{ secrets.MONOREPO_APP_PRIVATE_KEY }}
          owner: fractionaxapp
          repositories: |
            fractionaxapp
            api

      - name: Check out meta-monorepo
        uses: actions/checkout@v7
        with:
          repository: fractionaxapp/fractionaxapp
          submodules: recursive
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check out the triggering api commit
        run: |
          cd services/api
          git fetch origin "${API_SHA}"
          git checkout "${API_SHA}"
        env:
          API_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install proto toolchains
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore moon and dependency caches
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache
            ~/.local/share/pnpm/store
          key: ci-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ci-${{ runner.os }}-

      - name: Install dependencies
        # Not --frozen-lockfile: the meta-repo lockfile is pinned to its recorded api
        # SHA, which may differ from the commit under test.
        run: pnpm install --no-frozen-lockfile

      - name: Build, lint, typecheck and test the api
        run: moon run api:build api:lint api:typecheck api:test
