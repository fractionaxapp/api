# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: "application"
language: "typescript"
stack: "backend"
tags: ["ts", "api", "service"]
toolchains:
  default: ["node"]
project:
  name: "api"
  description: "FractionAX platform/business API (Fastify)."
dependsOn:
  - "core"

fileGroups:
  sources:
    - "src/**/*"
  tests:
    - "src/**/*.test.ts"

# Tasks run local binaries through `pnpm exec`. build/test/typecheck depend on
# upstream package builds (^:build) so @fractionax/core dist output exists first.
tasks:
  build:
    command: "pnpm exec tsc --build"
    deps:
      - "^:build"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    outputs:
      - "dist"
  dev:
    command: "pnpm exec tsx watch src/server.ts"
    preset: "server"
    deps:
      - "^:build"
  test:
    command: "pnpm exec vitest run"
    deps:
      - "^:build"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
  lint:
    command: "pnpm exec eslint ."
    inputs:
      - "@group(sources)"
      - "eslint.config.js"
  typecheck:
    command: "pnpm exec tsc --noEmit"
    deps:
      - "^:build"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
